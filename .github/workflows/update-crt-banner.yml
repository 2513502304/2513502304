name: Update CRT Banner on Birthday

on:
  schedule:
    - cron: "0 16 21 7 *"
  workflow_dispatch:

jobs:
  update-banner:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Generate CRT banner
        run: python tools/generate_crt_banner.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/banners/crt-banner.gif
          git diff --cached --quiet || git commit -m "Update CRT banner for birthday" && git push
